<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/medias.css">
    <title>Projeto Login</title>
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">

            </div>
            <div id="form"> 
                <h1>Login</h1>
                <p>Seja bem vindo novamente .Faça seu login para acessa sua conta  e pode fazer suas auterações por favor</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                       <i class="material-icons">person</i>
                        <input type="email" name="login" id="ilogin" placeholder="Seu email" autocomplete="email" required maxlength="30">
                         <label for="ilogin">Login</label>
                    </div>
                    <div class="campo">
                        <i class="material-icons">vpn_key</i>
                        <input type="password" name="isenha" id="senha" placeholder="Sua senha" autocomplete="current-password" required minlength="8" maxlength="40">
                        <label for="isenha">Senha </label>
                    </div>
                    <input type="submit" value="Entra">
                    <a href="esqueci.html" class="b">
                        esquecia senha <i class="material-icons">mail</i>                    </a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
