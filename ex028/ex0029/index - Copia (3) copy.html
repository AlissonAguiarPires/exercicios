<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Boxt</title>
    <style>
        div.content{
            background-color:blanchedalmond;
            display: flex;
            flex-flow: row nowrap;
        }
        div.A{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            flex-basis: 200px;
        }
        div#ca{
            flex-shrink: 0;
            flex-grow: 2;
        }
        div#cb{
            flex-shrink: 1;
            flex-grow: 2;
        }
        div#cc{
            flex-shrink: 3;
            flex-grow: 2;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="A" id="ca">A</div>
        <div class="A" id="cb">B</div>
        <div class="A" id="cc">C</div>
    </div>
</body>
</html>
