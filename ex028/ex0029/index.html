<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Boxt</title>
    <style>
        div.content{
            background-color: lightcoral;
            display: flex;
            flex-flow: row wrap;
            align-content: space-around;
            height: 400px;
            
        }
        div.A{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="A">A</div>
        <div class="A">B</div>
        <div class="A">C</div>
        <div class="A">D</div>
        <div class="A">E</div>
        <div class="A">F</div>
        <div class="A">G</div>
    </div>
</body>
</html>
