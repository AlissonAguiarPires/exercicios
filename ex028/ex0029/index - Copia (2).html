<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Boxt</title>
    <style>
        div.content{
            background-color: lightcoral;
            display: flex;
            flex-flow:  row wrap-reverse;
        }
        div.A{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            flex: auto;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="A">Exemplo de bloco A</div>
        <div class="A">Exemplo de bloco B</div>
        <div class="A">Exemplo de bloco C</div>
        <div class="A">Exemplo de bloco D</div>
        <div class="A">Exemplo de bloco E</div>
        <div class="A">Exemplo de bloco F</div>
        <div class="A">Exemplo de bloco G</div>
    </div>
</body>
</html>
